name: agentic-dev-loop
description: Comprehensive spec-driven development loop using OpenSpec and Archon
interactive: true
nodes:
  - id: plan
    command: archon-create-plan
    description: "Generate implementation plan from requirement specifications"

  - id: approve-plan
    approval:
      message: "Please review the generated implementation plan above before proceeding with code changes."
      capture_response: true
    depends_on: [plan]

  - id: implement
    command: archon-implement-tasks
    depends_on: [approve-plan]
    description: "Execute file edits according to the approved plan"

  - id: validate
    command: run-tests
    depends_on: [implement]
    context: fresh
    description: "Verify the configuration using 'nix flake check' and run 'openspec validate'"

  - id: code-review
    command: archon-code-review-agent
    depends_on: [validate]
    context: fresh
    description: "Perform parallel code quality and conventions review"

  - id: self-fix
    command: archon-implement-review-fixes
    depends_on: [code-review]
    context: fresh
    description: "Synthesize and automatically apply any recommended fixes from the review"
